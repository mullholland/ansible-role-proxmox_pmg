---
- name: Ensure /etc/apt/keyrings exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add PMG Apt signing key
  ansible.builtin.get_url:
    url: "{{ proxmox_pmg_repository_key }}"
    dest: "{{ proxmox_pmg_repository_keyring }}"
    mode: "0644"
    force: false

- name: Configure pmg-enterprise repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ proxmox_pmg_repository_keyring }}] https://enterprise.proxmox.com/debian/pmg {{ ansible_facts['distribution_release'] }} pmg-enterprise"
    state: "{{ proxmox_pmg_enable_enterprise_repository | bool | ternary('present', 'absent') }}"
    filename: pmg-enterprise
  register: proxmox_pmg_repository_enterprise_list

- name: Configure pmg-no-subscription repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by={{ proxmox_pmg_repository_keyring }}] http://download.proxmox.com/debian/pmg {{ ansible_facts['distribution_release'] }} pmg-no-subscription"
    state: "{{ proxmox_pmg_enable_no_subscription_repository | bool | ternary('present', 'absent') }}"
    filename: pmg-no-subscription
  register: proxmox_pmg_repository_no_subscription_list

- name: Update repository cache
  ansible.builtin.apt:
    update_cache: true
  when:
    proxmox_pmg_repository_enterprise_list.changed or
    proxmox_pmg_repository_no_subscription_list.changed
  # Data should be refreshed immediatly for other roles which depend on them
  # Flush handlers is not used because it would potentially flush handlers,
  # which are not meant to be flushed at this point in the playbook
  tags:
    - skip_ansible_lint
